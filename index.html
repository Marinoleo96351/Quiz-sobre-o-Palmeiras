<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Palmeiras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="titulo">
    <h1>Quiz sobre o Palmeiras - feito por Leo Marino</h1>
  </header>

  <main class="conteudo-jogo">
    <section class="questionario">

      <div class="conteudo">
        <span class="progresso"></span>
        <p class="pergunta"></p>
        <div class="respostas"></div>
      </div>

      <div class="fim">
        <p class="pontuacao-final"></p>
        <div class="rank-container">
          <span class="rank-titulo"></span>
          <span class="rank-mensagem"></span>
        </div>
        <div class="fim-acoes">
          <button class="btn-gabarito">Ver Gabarito</button>
          <button class="reiniciar">Reiniciar</button>
        </div>
        <div class="gabarito" id="gabarito"></div>
      </div>

    </section>
  </main>

  <footer class="rodape">
    &copy; 2025 Leo Marino. Todos os direitos reservados.
  </footer>

  <script src="quiz.js"></script>
</body>
</html>
